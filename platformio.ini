; ============================================================================
; PlatformIO — конфигурация сборки для ESP32-S3
; Система управления ректификационной колонной
; ============================================================================

[env:esp32-s3]
platform = espressif32 @ 6.8.1
board = esp32-s3-devkitc-1-n16r8v
framework = arduino

; ---------------------------
; Параметры чипа (ESP32-S3 N16R8 - 16MB Flash, 8MB PSRAM)
; ---------------------------
board_build.mcu = esp32s3
board_build.filesystem = littlefs
board_build.psram = enabled
board_build.flash_size = 16MB
board_build.partitions = default_16MB.csv
build_flags =
    -DCORE_DEBUG_LEVEL=3
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DARDUINO_USB_MODE=0
    -DCONFIG_ASYNC_TCP_USE_WDT=0
    -DCONFIG_ASYNC_TCP_STACK_SIZE=8192
    -DBOARD_HAS_PSRAM

; Скорость загрузки и монитора
upload_speed = 921600
monitor_speed = 115200
monitor_port = /dev/ttyACM0
monitor_filters = esp32_exception_decoder

; ---------------------------
; Библиотеки
; ---------------------------
lib_deps =
    bblanchon/ArduinoJson @ ^7.0.4
    paulstoffregen/OneWire @ ^2.3.8
    milesburton/DallasTemperature @ ^3.11.0
    knolleary/PubSubClient @ ^2.8
    esphome/AsyncTCP-esphome @ ^2.0.0
    esphome/ESPAsyncWebServer-esphome @ ^3.2.2

; ---------------------------
; LittleFS — загрузка веб-ассетов
; ---------------------------
; Файлы из data/ будут упакованы в LittleFS образ
; Команда: pio run --target uploadfs

; ---------------------------
; Среда
; ---------------------------
build_type = release